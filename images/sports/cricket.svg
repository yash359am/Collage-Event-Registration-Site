<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Cricket match in college fest</title>
  <desc id="desc">Premium illustrated banner showing a cricket bat, ball, and stumps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071226"/>
      <stop offset="1" stop-color="#21462c"/>
    </linearGradient>
    <linearGradient id="bat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6ad"/>
      <stop offset="1" stop-color="#b97832"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <path d="M0 320c140-70 280-80 430-28 124 43 240 40 370-12v170H0z" fill="#3dd598" opacity=".15"/>
  <g transform="translate(350 56) rotate(-18)">
    <rect x="70" y="0" width="64" height="270" rx="28" fill="url(#bat)"/>
    <rect x="82" y="244" width="40" height="120" rx="18" fill="#1b2432"/>
    <rect x="86" y="22" width="14" height="220" rx="7" fill="#fff3c4" opacity=".5"/>
  </g>
  <circle cx="585" cy="146" r="54" fill="#e84855"/>
  <path d="M550 114c34 28 58 58 74 99" fill="none" stroke="#ffffff" stroke-width="5" opacity=".65"/>
  <g transform="translate(180 190)" stroke="#ffe29a" stroke-width="12" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="130"/>
    <line x1="46" y1="-8" x2="46" y2="130"/>
    <line x1="92" y1="0" x2="92" y2="130"/>
    <line x1="-10" y1="-20" x2="102" y2="-20"/>
  </g>
  <text x="52" y="384" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="800">Cricket</text>
  <text x="52" y="416" fill="#ffd9a3" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3">GROUP GAMES</text>
</svg>
